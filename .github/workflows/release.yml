name: Release

# Publica los instaladores de Windows, macOS y Linux cuando se empuja una
# etiqueta de versión (por ejemplo `v1.1.0`). Cada sistema se compila en su
# runner nativo (Tauri no permite compilación cruzada) y los tres suben sus
# instaladores al MISMO borrador de Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''
          # Binario universal: un único .dmg para Macs Intel y Apple Silicon.
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal necesita ambas arquitecturas.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Dependencias del sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Caché de Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependencias
        run: npm ci

      # tauri-action ejecuta `npm run build` (beforeBuildCommand) + `tauri build`
      # y sube los instaladores al borrador de release de la etiqueta.
      - name: Compilar y publicar los instaladores
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pyx ${{ github.ref_name }}'
          releaseBody: |
            Instaladores adjuntos abajo: Windows (`.exe`), macOS (`.dmg`, universal Intel+Apple Silicon) y Linux (`.deb` / `.rpm` / `.AppImage`).
            Requiere **Python 3** y una distribución **LaTeX** (MiKTeX, MacTeX o TeX Live) instalados aparte.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
